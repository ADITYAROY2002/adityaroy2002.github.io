<div class="contact-section">
    <h2>Contact Us</h2>
    <!-- Other contact section content -->
    <div class="star-rating">
        <span class="star" data-value="1">&#9733;</span>
        <span class="star" data-value="2">&#9733;</span>
        <span class="star" data-value="3">&#9733;</span>
        <span class="star" data-value="4">&#9733;</span>
        <span class="star" data-value="5">&#9733;</span>
    </div>
    <p>Your rating: <span id="rating-value">0</span></p>
</div>

<style>
    .star-rating {
        display: flex;
        cursor: pointer;
    }
    .star {
        font-size: 24px;
        color: #ccc;
        transition: color 0.2s;
    }
    .star:hover,
    .star.selected {
        color: gold;
    }
</style>

<script>
    const stars = document.querySelectorAll('.star');
    const ratingValue = document.getElementById('rating-value');

    stars.forEach((star) => {
        star.addEventListener('click', () => {
            // Remove selected class from all stars
            stars.forEach(s => s.classList.remove('selected'));
            // Add selected class to the clicked star and all previous siblings
            star.classList.add('selected');
            let ratedValue = star.getAttribute('data-value');
            ratingValue.textContent = ratedValue;
        });
    });
</script>
